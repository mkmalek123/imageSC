<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR View</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  
  <!-- A-Frame and MindAR -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <!-- Custom Logic -->
  <script src="./js/app.js"></script>
  
  <style>
    /* Ensure the A-Frame scene takes up the full screen and hides scrollbars */
    body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
  </style>
</head>
<body>

  <!-- Custom HUD / UI Overlay -->
  <div id="ar-ui">
    <a href="index.html" class="btn-back">← Back</a>
    
    <div id="scanning-overlay" class="scanning-indicator">
      Scanning for targets <div class="dot-flashing"></div>
    </div>
  </div>

  <!-- 
    Replace the imageTargetSrc below with your own compiled .mind file.
    Currently using a placeholder target file that contains 4 targets.
  -->
  <a-scene 
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/band-example/targets.mind;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <!-- Target 0 Asset: Image Overlay -->
      <img id="overlay-img" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/portfolio/paintandquest-preview.png" crossorigin="anonymous">
      
      <!-- Target 1 Asset: Video Overlay -->
      <!-- playsinline and webkit-playsinline are CRITICAL for iOS video playback -->
      <video id="overlay-vid" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/portfolio/paintandquest.mp4" 
             loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
             
      <!-- Target 2 Asset: 3D Model -->
      <a-asset-item id="overlay-model" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/band-example/raccoon/scene.gltf"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 0: Displays an Image -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-0">
      <a-image src="#overlay-img" position="0 0 0" height="1" width="1"></a-image>
    </a-entity>

    <!-- Target 1: Displays a Video -->
    <a-entity mindar-image-target="targetIndex: 1" id="target-1">
      <a-video src="#overlay-vid" position="0 0 0" height="0.5" width="1"></a-video>
    </a-entity>

    <!-- Target 2: Displays a 3D Model -->
    <a-entity mindar-image-target="targetIndex: 2" id="target-2">
      <!-- GLTF models often need scaling/rotation adjustments depending on how they were exported -->
      <a-gltf-model src="#overlay-model" position="0 -0.4 0" scale="0.1 0.1 0.1" rotation="0 0 0"></a-gltf-model>
    </a-entity>

  </a-scene>
</body>
</html>
